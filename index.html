<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск книг</title>
    <style>
        :root { --blue: #2563eb; --green: #059669; --red: #dc2626; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; max-width: 900px; margin: 0 auto; padding: 20px; }
        .banner { text-align: center; font-size: 0.8rem; background: #1e293b; color: white; padding: 8px; border-radius: 8px; margin-bottom: 15px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .search-row { display: flex; gap: 10px; margin: 20px 0; }
        input { flex: 1; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        button { background: var(--blue); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .rate { float: right; font-size: 0.8rem; color: #64748b; background: #f1f5f9; padding: 4px 10px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .price-czk { font-weight: bold; display: block; }
        .price-eur { font-size: 0.8rem; color: #64748b; }
        .updated { font-size: 0.7rem; color: #94a3b8; display: block; }
        .stock-yes { color: var(--green); font-weight: bold; }
        .stock-no { color: var(--red); font-weight: bold; opacity: 0.6; }
        .book-block { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .book-header { background: #f1f5f9; padding: 10px 15px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div id="topBanner" class="banner">⏳ Синхронизация данных...</div>

<div class="card">
    <div id="rateInfo" class="rate">Курс: -- CZK</div>
    <h1>📚 Поиск наличия книг</h1>
    
    <div class="search-row">
        <input type="text" id="q" placeholder="Введите название или ISBN...">
        <button onclick="runSearch()">Найти</button>
    </div>

    <div id="loader" style="text-align:center;">Загрузка базы данных...</div>
    <div id="results"></div>
</div>

<script>
    let db = null;
    let czkRate = 25.30;

    window.onload = async () => {
        try {
            // Get Currency
            const r = await fetch('https://open.er-api.com/v6/latest/EUR');
            const rData = await r.json();
            if(rData.rates?.CZK) {
                czkRate = rData.rates.CZK;
                document.getElementById('rateInfo').innerText = `1 EUR = ${czkRate.toFixed(2)} CZK`;
            }

            // Get Books
            const b = await fetch('books_lookup.json?v=' + Date.now());
            db = await b.json();
            
            const firstDate = Object.values(db.shop_dates || {})[0] || 'недавно';
            document.getElementById('topBanner').innerText = `Данные обновлены: ${firstDate}`;
            document.getElementById('loader').style.display = 'none';
        } catch (e) {
            document.getElementById('loader').innerText = "Ошибка загрузки данных.";
        }
    };

    function runSearch() {
        const query = document.getElementById('q').value.toLowerCase().trim();
        const res = document.getElementById('results');
        res.innerHTML = '';
        if(!query || !db) return;

        let count = 0;
        for (const [isbn, data] of Object.entries(db.books)) {
            if (isbn.includes(query) || (data.title || "").toLowerCase().includes(query)) {
                count++;
                addBook(isbn, data, res);
            }
            if (count >= 20) break;
        }
        if(count === 0) res.innerHTML = "Ничего не найдено.";
    }

    function addBook(isbn, data, container) {
        let rows = '';
        for (const [shop, info] of Object.entries(data.availability)) {
            const eur = parseFloat(info.price.replace(',', '.')) || 0;
            const czk = Math.round(eur * czkRate);
            const date = db.shop_dates?.[shop] || '';

            rows += `<tr>
                <td><strong>${shop}</strong><span class="updated">${date}</span></td>
                <td><span class="price-czk">${czk} CZK</span><span class="price-eur">€${eur.toFixed(2)}</span></td>
                <td class="${info.in_stock ? 'stock-yes' : 'stock-no'}">${info.in_stock ? '● В НАЛИЧИИ' : '○ НЕТ'}</td>
            </tr>`;
        }
        container.innerHTML += `<div class="book-block">
            <div class="book-header"><strong>${data.title}</strong><br><small>ISBN: ${isbn}</small></div>
            <table>${rows}</table>
        </div>`;
    }
</script>
</body>
</html>
