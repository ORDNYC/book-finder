<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поиск книг | Berlin & Beyond</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px; line-height: 1.6; color: #333; }
        h1 { color: #2c3e50; text-align: center; }
        .search-container { margin-bottom: 30px; text-align: center; background: #f8f9fa; padding: 20px; border-radius: 8px; }
        input { padding: 12px; width: 70%; max-width: 400px; border: 2px solid #ddd; border-radius: 4px; font-size: 16px; }
        button { padding: 12px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-left: 5px; }
        button:hover { background: #2980b9; }
        #loading { text-align: center; color: #7f8c8d; font-style: italic; margin-top: 20px; }
        #error-msg { color: #e74c3c; background: #fadbd8; padding: 15px; border-radius: 5px; display: none; margin-top: 20px; border-left: 5px solid #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .in-stock { color: #27ae60; font-weight: bold; }
        .out-of-stock { color: #c0392b; }
        .book-info { margin-bottom: 10px; padding: 10px; border-bottom: 2px solid #3498db; }
    </style>
</head>
<body>

    <h1>📚 Book Availability Finder</h1>

    <div class="search-container">
        <input type="text" id="isbnInput" placeholder="Enter ISBN (e.g., 9785890595904)">
        <button onclick="searchBook()">Search</button>
    </div>

    <div id="loading">⏳ Загрузка данных...</div>
    <div id="error-msg"></div>

    <div id="results">
        <div id="bookDetail" class="book-info" style="display:none;"></div>
        <table id="shopsTable">
            <thead>
                <tr>
                    <th>Bookstore</th>
                    <th>Price</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let masterData = null;

        // LOAD DATA ON STARTUP
        window.onload = async () => {
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error-msg');
            
            try {
                // Use a 'cache-buster' timestamp to ensure we don't load an old version of the file
                const response = await fetch('books_lookup.json?v=' + Date.now());
                
                if (!response.ok) {
                    throw new Error(`Database file not found (Status ${response.status}). Ensure 'books_lookup.json' is in the main folder.`);
                }
                
                masterData = await response.json();
                
                if (!masterData.books || Object.keys(masterData.books).length === 0) {
                    throw new Error("База данных пуста. Проверьте результат работы скрипта Python.");
                }

                loadingDiv.style.display = 'none';
                console.log("Successfully loaded " + Object.keys(masterData.books).length + " books.");

            } catch (error) {
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
                console.error("Initialization Error:", error);
            }
        };

        // SEARCH FUNCTION
        function searchBook() {
            const input = document.getElementById('isbnInput').value.trim().replace(/-/g, '');
            const table = document.getElementById('shopsTable');
            const tableBody = document.getElementById('tableBody');
            const bookDetail = document.getElementById('bookDetail');
            const errorDiv = document.getElementById('error-msg');

            // Reset UI
            tableBody.innerHTML = '';
            table.style.display = 'none';
            bookDetail.style.display = 'none';
            errorDiv.style.display = 'none';

            if (!masterData) {
                alert("Датабаза грузится или не смогла загрузиться.");
                return;
            }

            if (masterData.books[input]) {
                const book = masterData.books[input];
                
                // Show Book Title
                bookDetail.innerHTML = `<h3>Found: ${book.title}</h3><p>ISBN: ${input}</p>`;
                bookDetail.style.display = 'block';

                // Build Table
                for (const [shop, info] of Object.entries(book.availability)) {
                    const row = `<tr>
                        <td>${shop}</td>
                        <td>${info.price}</td>
                        <td class="${info.in_stock ? 'in-stock' : 'out-of-stock'}">
                            ${info.in_stock ? '✅ In Stock' : '❌ Out of Stock'}
                        </td>
                    </tr>`;
                    tableBody.innerHTML += row;
                }
                table.style.display = 'table';
            } else {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `No data found for ISBN: ${input}. Try another!`;
            }
        }

        // Allow pressing "Enter" to search
        document.getElementById('isbnInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchBook();
        });
    </script>
</body>
</html>
